<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kite Token Extractor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f6f8fa;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .wishes {
            font-size: 22px;
            font-weight: 600;
            color: #24292e;
            margin-bottom: 24px;
        }
        h3 { 
            color: #24292e; 
            margin-bottom: 10px; 
            font-size: 16px;
            text-align: left;
        }
        .token-box {
            background: #f1f8ff;
            border: 1px solid #c8e1ff;
            padding: 14px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 16px;
            word-break: break-all;
            margin-bottom: 20px;
            color: #0366d6;
            text-align: left;
        }
        button {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }
        button:hover { background-color: #2c974b; }
        button:active { transform: scale(0.98); }
        .error { color: #cb2431; background: #ffeef0; border-color: #fdb8c0; }
    </style>
</head>
<body>

<div class="container">
    <!-- Clean Dynamic Greeting Section -->
    <div class="wishes" id="wishes-display">Hello!</div>
    
    <hr style="border: 0; border-top: 1px solid #e1e4e8; margin-bottom: 20px;">

    <h3>Kite Request Token</h3>
    <div id="token-display" class="token-box">Loading...</div>
    <button id="copy-btn" onclick="copyToken()">Copy Token</button>
</div>

<script>
    // 1. Time-based Greeting Functionality
    function setupHeader() {
        const now = new Date();
        const hours = now.getHours();
        let wish = "Hello!";
        
        if (hours < 12) {
            wish = "Good Morning!";
        } else if (hours < 16) {
            wish = "Good Afternoon!";
        } else {
            wish = "Good Evening!";
        }
        document.getElementById('wishes-display').innerText = wish;
    }

    // 2. Token Extraction Functionality
    const urlParams = new URLSearchParams(window.location.search);
    const requestToken = urlParams.get('request_token');
    const tokenDisplay = document.getElementById('token-display');
    const copyBtn = document.getElementById('copy-btn');

    if (requestToken) {
        tokenDisplay.innerText = requestToken;
    } else {
        tokenDisplay.innerText = "No request token found in URL.";
        tokenDisplay.classList.add('error');
        copyBtn.style.display = 'none';
    }

    function copyToken() {
        if (requestToken) {
            navigator.clipboard.writeText(requestToken).then(() => {
                copyBtn.innerText = "Copied!";
                copyBtn.style.backgroundColor = "#0366d6";
                setTimeout(() => {
                    copyBtn.innerText = "Copy Token";
                    copyBtn.style.backgroundColor = "#2ea44f";
                }, 2000);
            }).catch(err => {
                alert("Failed to copy token: " + err);
            });
        }
    }

    // Run greeting setup when page loads
    setupHeader();
</script>

</body>
</html>
